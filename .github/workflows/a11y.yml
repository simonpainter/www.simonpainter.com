name: Accessibility

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  pa11y:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Docusaurus site
        run: npm run build

      - name: Start local site
        run: |
          npm run serve -- --host 127.0.0.1 --port 3000 --no-open > serve.log 2>&1 &
          echo $! > serve.pid

          for i in {1..30}; do
            if curl --silent --fail http://127.0.0.1:3000/ > /dev/null; then
              exit 0
            fi
            sleep 2
          done

          echo "The local site did not start in time."
          cat serve.log
          exit 1

      - name: Run accessibility checks
        run: npm run test:a11y

      - name: Generate PR comment report
        if: always()
        run: |
          node <<'EOF'
          const fs = require('node:fs');

          const jsonPath = 'pa11y-report.json';
          const markdownPath = 'pa11y-report.md';
          const serveLogPath = 'serve.log';
          const escapeInlineCode = value => String(value ?? '').replace(/`/g, '\\`');
          const truncate = (value, max = 160) => {
            const text = String(value ?? '').replace(/\s+/g, ' ').trim();
            return text.length > max ? `${text.slice(0, max - 3)}...` : text;
          };

          if (!fs.existsSync(jsonPath)) {
            let output = '## Accessibility report\n\nNo JSON report was generated.\n';
            if (fs.existsSync(serveLogPath)) {
              const serveLog = fs.readFileSync(serveLogPath, 'utf8').trim();
              output += `\n<details><summary>Local server log</summary>\n\n\`\`\`\n${serveLog}\n\`\`\`\n</details>\n`;
            }
            fs.writeFileSync(markdownPath, output, 'utf8');
            process.exit(0);
          }

          const report = JSON.parse(fs.readFileSync(jsonPath, 'utf8'));
          const pages = Object.entries(report.results || {}).sort(([left], [right]) => left.localeCompare(right));
          const lines = [];
          lines.push('## Accessibility report');
          lines.push('');
          lines.push(`- Pages tested: ${report.total ?? 0}`);
          lines.push(`- Pages passed: ${report.passes ?? 0}`);
          lines.push(`- Violations found: ${report.errors ?? 0}`);
          lines.push('');

          for (const [url, issues] of pages) {
            lines.push(`### ${url}`);
            if (!issues.length) {
              lines.push('- No WCAG 2 AA violations found.');
              lines.push('');
              continue;
            }

            for (const issue of issues.slice(0, 8)) {
              lines.push(`- \`${escapeInlineCode(issue.code || 'issue')}\` ${truncate(issue.message || 'Accessibility issue')}`);
              if (issue.selector) {
                lines.push(`  - selector: \`${escapeInlineCode(issue.selector)}\``);
              }
            }
            if (issues.length > 8) {
              lines.push(`- ... and ${issues.length - 8} more issue(s) on this page`);
            }
            lines.push('');
          }

          fs.writeFileSync(markdownPath, `${lines.join('\n')}\n`, 'utf8');
          EOF

      - name: Comment accessibility report on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('node:fs');
            const path = 'pa11y-report.md';
            const marker = '<!-- pa11y-report -->';
            const body = fs.existsSync(path)
              ? `${marker}\n${fs.readFileSync(path, 'utf8')}`
              : `${marker}\n## Accessibility report\n\nNo report was generated.`;

            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number
            });

            const existing = comments.find(comment => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body
              });
            }

      - name: Stop local site
        if: always()
        run: |
          if [ -f serve.pid ]; then
            kill "$(cat serve.pid)" || true
          fi
