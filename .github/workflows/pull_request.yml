name: Add build log to PR

on:
  pull_request:
    types: [opened, reopened]

jobs:
  build-and-comment:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Docusaurus site
        run: |
          npm run build --verbose > build.log 2>&1
          cat build.log  # Print log for visibility in GitHub Actions console

      - name: Upload build log
        uses: mshick/add-pr-comment@v2
        if: always()
        with:
          message-path: 'build.log'
          repo-token: ${{ secrets.GITHUB_TOKEN }}  # Added required token

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Sync to Azure Blob Storage
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            az storage blob sync \
              --source build/ \
              --container '$web' \
              --account-name ${{ secrets.PREPROD_AZURE_STORAGE_ACCOUNT }} \
              --delete-destination true
